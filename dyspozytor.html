<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Dyspozytora | System</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --card-bg: #16161a;
            --text-main: #ffffff;
            --text-muted: #a0a0a8;
            --accent-blue: #2f80ed;
            --accent-green: #27ae60;
            --accent-red: #eb5757;
            --accent-orange: #f2994a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 30px; }

        /* Ekran Zakończenia - Nowoczesny Minimalizm */
        #shutdown-screen {
            display: none;
            position: fixed; top:0; left:0; width: 100%; height: 100%;
            background: var(--bg-color);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .shutdown-box {
            background: var(--card-bg);
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #2d2d3a;
        }

        /* Istniejące style */
        .lock-screen { max-width: 400px; margin: 150px auto; text-align: center; background: #16161a; padding: 40px; border-radius: 12px; border: 1px solid #2d2d3a; }
        input, select, textarea { width: 100%; padding: 12px; background: #202026; border: 1px solid #3d3d4e; border-radius: 6px; color: white; margin-bottom: 15px; outline: none; }
        .btn { width: 100%; background: var(--accent-blue); color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .btn-red { background: var(--accent-red); margin-top: 5px; }
        .btn-green { background: var(--accent-green); }
        .main-panel { display: none; max-width: 1200px; margin: 0 auto; }
        .panel-header { display: flex; justify-content: space-between; border-bottom: 2px solid #222; padding-bottom: 15px; margin-bottom: 25px; }
        .panel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: var(--card-bg); border: 1px solid #23232a; padding: 25px; border-radius: 12px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <!-- EKRAN ZAKOŃCZENIA -->
    <div id="shutdown-screen">
        <div class="shutdown-box">
            <h1 style="color: var(--accent-red); font-size: 3rem;">SYSTEM WYŁĄCZONY</h1>
            <p style="color: var(--text-muted); margin: 20px 0;">Działanie panelu dyspozytorskiego zostało trwale zakończone.</p>
            <button class="btn" style="background:#444;" onclick="location.reload()">Resetuj</button>
        </div>
    </div>

    <!-- LOGOWANIE -->
    <div class="lock-screen" id="auth-block">
        <h2>🔒 Panel Dyspozytorski v1.1</h2>
        <input type="password" id="pin-input" placeholder="PIN" style="text-align:center; letter-spacing: 5px;">
        <button class="btn" onclick="unlock()">Autoryzuj</button>
    </div>

    <!-- PANEL GŁÓWNY -->
    <div class="main-panel" id="panel-block">
        <div class="panel-header">
            <div>
                <h2>🛠️ Centrala Ruchu</h2>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn" onclick="location.reload()" style="background:#444;">Zablokuj</button>
                <button class="btn btn-red" onclick="terminateSystem()" style="width:auto; padding:0 20px;">WYŁĄCZ SYSTEM</button>
            </div>
        </div>

        <div class="panel-grid">
            <div class="panel-col">
                <div class="card">
                    <h3>Panel Sterowania</h3>
                    <p>Wszystkie funkcje dyspozytorskie aktywne.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PIN_SECRET = "2580";
        const firebaseConfig = { databaseURL: "https://gait-panel-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function unlock() {
            if(document.getElementById('pin-input').value === PIN_SECRET) {
                document.getElementById('auth-block').style.display = 'none';
                document.getElementById('panel-block').style.display = 'block';
            } else { alert("Błędny PIN!"); }
        }

        function terminateSystem() {
            if(confirm("Czy na pewno chcesz trwale zamknąć panel?")) {
                document.getElementById('panel-block').style.display = 'none';
                document.getElementById('shutdown-screen').style.display = 'flex';
                firebase.database().goOffline();
            }
        }
    </script>
</body>
</html>
