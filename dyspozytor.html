<script>
function quickPreview() {

    database.ref('systemDatabase/' + id + '/schedule').once('value').then(snap => {
        const sched = snap.val();
        document.getElementById('quick-view-list').innerHTML = sched.map(s => 
            `<div>${s.date}: ${s.line}</div>`).join('');
    });
}

function resetSchedule() {
    const id = document.getElementById('quick-id').value;
    if(confirm("Czy na pewno wyczyścić cały tydzień dla ID " + id + "?")) {
        database.ref('systemDatabase/' + id + '/schedule').update({/* wstaw logikę resetu na --- */});

    <script>
        const PIN_SECRET = "2580";
        const daysOfWeek = ["Poniedziałek", "Wtorek", "Środa", "Czwartek", "Piątek", "Sobota", "Niedziela"];

        const firebaseConfig = {
            apiKey: "AIzaSyBVzHQx3OkcLZ-RDwq4Asrd7NfszmhLtME",
            authDomain: "gait-panel.firebaseapp.com",
            databaseURL: "https://gait-panel-default-rtdb.firebaseio.com",
            projectId: "gait-panel",
            storageBucket: "gait-panel.appspot.com",
            messagingSenderId: "164822494222",
            appId: "1:164822494222:web:cc4b8e9d2465cc47efa05f"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function unlock() {
            if(document.getElementById('pin-input').value === PIN_SECRET) {
                document.getElementById('auth-block').style.display = 'none';
                document.getElementById('panel-block').style.display = 'block';
                observeMessages();
                observeDrivers();
            } else {
                alert("Błędny kod PIN!");
                document.getElementById('pin-input').value = "";
            }
        }

        function observeDrivers() {
            database.ref('driversRegistry').on('value', (snapshot) => {
                const drivers = snapshot.val();
                const container = document.getElementById('active-drivers-list');
                if(!drivers) { container.innerHTML = `<div style="color:var(--text-muted); font-size:12px; text-align:center; padding:10px;">Brak kierowców</div>`; return; }
                let html = '';
                Object.keys(drivers).sort((a,b) => a - b).forEach(id => {
                    const d = drivers[id];
                    html += `<div class="driver-item"><span class="id-tag">[ID: ${id}]</span><span style="color:white;">${d.name} <small style="color:var(--accent-orange);">(${d.bus || 'Brak wozu'})</small></span></div>`;
                });
                container.innerHTML = html;
            });
        }

        // NASŁUCHIWANIE KOMUNIKATÓW Z FUNKCJĄ WYŚWIETLANIA EDYCJI DLA DYSPOZYTORA
        let globalMessages = [];
        function observeMessages() {
            database.ref('dispatcherMessages').on('value', (snapshot) => {
                globalMessages = snapshot.val() || [];
                const container = document.getElementById('dispatcher-messages-list');

                if (globalMessages.length === 0) {
                    container.innerHTML = `<div style="color:var(--text-muted); font-size:12px; text-align:center; padding:10px;">Brak komunikatów na serwerze.</div>`;
                    return;
                }

                let html = '';
                globalMessages.forEach((msg, index) => {
                    html += `
                        <div class="msg-edit-item">
                            <div><strong>[${msg.tag}]</strong> ${msg.title}</div>
                            <div style="color:var(--text-muted); font-size:11px; margin-top:2px;">${msg.content.substring(0, 45)}...</div>
                            <div class="msg-edit-controls">
                                <button class="btn btn-mini btn-green" onclick="startEditMsg(${index})">📝 Edytuj treść</button>
                                <button class="btn btn-mini btn-red" onclick="deleteSingleMsg(${index})">Usuń</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }

        // EDYCJA KOMUNIKATU - ŁADOWANIE DO FORMULARZA
        function startEditMsg(index) {
            const msg = globalMessages[index];
            document.getElementById('msg-form-title').innerText = "📝 Edytujesz Komunikat Ruchu";
            document.getElementById('msg-type').value = msg.type;
            document.getElementById('msg-tag').value = msg.tag;
            document.getElementById('msg-title').value = msg.title;
            document.getElementById('msg-content').value = msg.content;
            document.getElementById('edit-msg-index').value = index;

            document.getElementById('btn-msg-submit').innerText = "Zaktualizuj ogłoszenie w sieci";
            document.getElementById('btn-msg-cancel').style.display = 'block';
            document.getElementById('msg-form-title').scrollIntoView({ behavior: 'smooth' });
        }

        function cancelMsgEdit() {
            document.getElementById('msg-form-title').innerText = "⚠️ Generator Komunikatów Ruchu";
            document.getElementById('msg-tag').value = "";
            document.getElementById('msg-title').value = "";
            document.getElementById('msg-content').value = "";
            document.getElementById('edit-msg-index').value = "-1";
            document.getElementById('btn-msg-submit').innerText = "Opublikuj Komunikat sieciowo";
            document.getElementById('btn-msg-cancel').style.display = 'none';
        }

        function addLiveMessage() {
            const type = document.getElementById('msg-type').value;
            const tag = document.getElementById('msg-tag').value.trim() || "INFO";
            const title = document.getElementById('msg-title').value.trim();
            const content = document.getElementById('msg-content').value.trim();
            const editIndex = parseInt(document.getElementById('edit-msg-index').value);

            if (!title || !content) return alert("Uzupełnij pola ogłoszenia!");

            if (editIndex > -1) {
                // Tryb Edycji - Aktualizujemy istniejący wpis
                globalMessages[editIndex] = { type, tag, title, content };
                database.ref('dispatcherMessages').set(globalMessages, () => {
                    alert("Zaktualizowano komunikat w chmurze!");
                    cancelMsgEdit();
                });
            } else {
                // Tryb Nowego wpisu
                globalMessages.unshift({ type, tag, title, content });
                database.ref('dispatcherMessages').set(globalMessages, () => {
                    alert("Opublikowano nowy komunikat!");
                    document.getElementById('msg-tag').value = "";
                    document.getElementById('msg-title').value = "";
                    document.getElementById('msg-content').value = "";
                });
            }
        }

        function deleteSingleMsg(index) {
            if(confirm("Usunąć ten komunikat?")) {
                globalMessages.splice(index, 1);
                database.ref('dispatcherMessages').set(globalMessages);
            }
        }

        function clearAllMessages() {
            if(confirm("Wyczyścić całą tablicę?")) {
                database.ref('dispatcherMessages').remove().then(() => alert("Wyczyszczono."));
            }
        }

        function saveDriver() {
            const id = document.getElementById('reg-id').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const bus = document.getElementById('reg-bus').value.trim() || "Brak wozu";
            if(!id || !name) return alert("Uzupełnij ID oraz Imię i Nazwisko!");

            database.ref('driversRegistry/' + id).set({ name, bus }, (error) => {
                if(error) { alert("Błąd!"); } else {
                    database.ref('systemDatabase/' + id + '/busNum').set(bus);
                    database.ref('systemDatabase/' + id + '/name').set(name);
                    alert(`Zapisano pomyślnie pracownika ID: ${id}`);
                    document.getElementById('reg-id').value = "";
                    document.getElementById('reg-name').value = "";
                    document.getElementById('reg-bus').value = "";
                }
            });
        }

        function saveSchedule() {
            const id = document.getElementById('disp-id').value.trim();
            const day = document.getElementById('disp-day').value;
            const line = document.getElementById('disp-line').value.trim();
            const hours = document.getElementById('disp-hours').value.trim() || "06:00 - 14:00";
            const customBus = document.getElementById('disp-custom-bus').value.trim(); // Nowe pole wozu zastępczego
            const sig = document.getElementById('disp-sig').value.trim() || "Dyspozytor";
            const route = document.getElementById('disp-route').value.trim() || "Trasa zadana";

            if(!id || !line) return alert("Wypełnij ID oraz Linię!");

            database.ref('driversRegistry/' + id).once('value').then((snapshot) => {
                const regData = snapshot.val();
                const name = regData ? regData.name : `Kierowca o ID: ${id}`;
                const defaultBus = regData ? regData.bus : "Brak wozu";

                // Pobieramy stare dane grafiku, aby zachować przydziały wozów z innych dni
                database.ref('systemDatabase/' + id).once('value').then((oldSchedSnap) => {
                    const oldData = oldSchedSnap.val();

                    const schedule = daysOfWeek.map(d => {
                        if (d === day) {
                            // Dzień aktualnie generowany: jeśli wpisano customBus to go użyj, jeśli nie - użyj stałego wozu
                            return {
                                date: `${d} [SŁUŻBA]`,
                                line: line,
                                route: route,
                                hours: hours,
                                dayBus: customBus || defaultBus, // Przypisanie dedykowanego wozu na ten dzień
                                current: true
                            };
                        } else {
                            // Przepisywanie innych dni lub tworzenie czystych
                            let existingDay = oldData && oldData.schedule ? oldData.schedule.find(x => x.date.startsWith(d)) : null;
                            return {
                                date: existingDay ? existingDay.date : d,
                                line: existingDay ? existingDay.line : "---",
                                route: existingDay ? existingDay.route : "WOLNE",
                                hours: existingDay ? existingDay.hours : "---",
                                dayBus: existingDay ? (existingDay.dayBus || defaultBus) : defaultBus,
                                current: false
                            };
                        }
                    });

                    database.ref('systemDatabase/' + id).set({
                        name: name,
                        busNum: defaultBus, // Zostaje w nagłówku jako informacja o wozie stałym
                        activeDay: day,
                        dispatcher: sig,
                        schedule: schedule
                    }, (error) => {
                        if(error) { alert("Błąd!"); } else {
                            alert(`Grafik dla ID ${id} wysłany do chmury!`);
                            document.getElementById('disp-id').value = "";
                            document.getElementById('disp-line').value = "";
                            document.getElementById('disp-custom-bus').value = "";
                            document.getElementById('disp-route').value = "";
                        }
                    });
                });
            });
        }
    </script>
</body>
