<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>System Wyłączony</title>
    <style>
        :root { 
            --bg-color: #0c0c0e; 
            --card-bg: #16161a; 
            --text-main: #ffffff; 
            --text-muted: #a0a0a8; 
            --accent-red: #eb5757; 
            /* Zmiana czcionki na systemową bezszeryfową z lepszym światłem */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: var(--font-family);
        }
        
        .shutdown-screen {
            display: flex;
            height: 100vh;
            background: var(--bg-color);
            justify-content: center;
            align-items: center;
        }
        
        .shutdown-box {
            background: var(--card-bg);
            padding: 60px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #2d2d3a;
            max-width: 500px;
            width: 90%;
        }

        h1 { 
            color: var(--accent-red); 
            font-size: 2rem; 
            margin-bottom: 20px; 
            letter-spacing: 0.05em; /* Lepsza czytelność */
            text-transform: uppercase;
        }

        p { 
            color: var(--text-muted); 
            font-size: 1rem; 
            line-height: 1.6; 
            letter-spacing: 0.02em;
        }
    </style>
</head>
<body>

    <div class="shutdown-screen">
        <div class="shutdown-box">
            <h1>System wyłączony</h1>
            <p>
                Działanie panelu pracownika zostało zakończone.<br>
                Dziękujemy za korzystanie z naszego systemu.
            </p>
        </div>
    </div>

</body>
</html>
