<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Kierowcy - Grafik Live v1.1</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --card-bg: #16161a;
            --text-main: #ffffff;
            --text-muted: #a0a0a8;
            --accent-blue: #2f80ed;
            --accent-green: #27ae60;
            --accent-orange: #f2994a;
            --accent-red: #eb5757;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding: 20px; }
        
        .container { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--card-bg); border: 1px solid #23232a; padding: 20px; border-radius: 12px; }
        
        .header { text-align: center; padding: 20px 0; }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { color: var(--text-muted); font-size: 14px; }
        
        .search-box { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 14px; background: #202026; border: 1px solid #3d3d4e; border-radius: 8px; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: var(--accent-blue); }
        
        .btn { background: var(--accent-blue); color: white; border: none; padding: 14px 24px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 16px; }
        
        .msg-board h3 { color: var(--accent-orange); font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 15px; }
        .msg-list { display: flex; flex-direction: column; gap: 15px; }
        .msg-item { padding: 15px; border-radius: 8px; background: #202026; border-left: 4px solid #555; }
        .msg-item.danger { border-left-color: var(--accent-red); background: rgba(235, 87, 87, 0.05); }
        .msg-item.warning { border-left-color: var(--accent-orange); background: rgba(242, 153, 74, 0.05); }
        .msg-item.info { border-left-color: var(--accent-blue); background: rgba(47, 128, 237, 0.05); }
        .msg-tag { font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 4px; color: white; display: inline-block; margin-bottom: 5px; }
        .msg-item.danger .msg-tag { background: var(--accent-red); }
        .msg-item.warning .msg-tag { background: var(--accent-orange); }
        .msg-item.info .msg-tag { background: var(--accent-blue); }
        .msg-title { font-weight: bold; font-size: 15px; margin-bottom: 3px; }
        .msg-text { font-size: 13px; color: var(--text-muted); line-height: 1.4; }
        
        .schedule-zone { display: none; }
        .driver-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .driver-info h2 { font-size: 20px; }
        .driver-info span { font-size: 14px; color: var(--text-muted); }
        
        .day-row { display: flex; flex-direction: column; padding: 15px; border-radius: 8px; background: #1c1c22; margin-bottom: 10px; border: 1px solid #282833; }
        .day-row.active { border-color: var(--accent-green); background: rgba(39, 174, 96, 0.05); }
        .day-top { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 8px; font-size: 15px; }
        .day-top .day-name { color: var(--text-main); }
        .day-row.active .day-top .day-name { color: var(--accent-green); }
        .day-top .line-badge { background: #2d2d3a; padding: 2px 8px; border-radius: 4px; font-size: 13px; }
        .day-row.active .day-top .line-badge { background: var(--accent-green); color: white; }
        .day-details { font-size: 13px; color: var(--text-muted); display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    </style>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div class="container">
        
        <div class="header">
            <h1>🚏 Wirtualna Zajezdnia OMSI 2</h1>
            <p>System Informacji i Harmonogramów Pracy Kierowców</p>
        </div>

        <div class="card">
            <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px;">Podaj swój numer identyfikacyjny kierowcy:</p>
            <div class="search-box">
                <input type="number" id="driver-id-input" placeholder="Wpisz ID (np. 105)">
                <button class="btn" onclick="checkScheduleLive()">Sprawdź grafik</button>
            </div>
        </div>

        <div class="card msg-board">
            <h3>⚠️ Bieżące komunikaty i utrudnienia ruchu</h3>
            <div class="msg-list" id="live-messages-container">
                <div style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 10px;">Brak aktualnych komunikatów na sieci. Spokojnej służby!</div>
            </div>
        </div>

        <div class="card schedule-zone" id="schedule-block">
            <div class="driver-info">
                <div>
                    <h2 id="driver-name-display">Kierowca</h2>
                    <span id="dispatcher-signature">Dyspozytor</span>
                </div>
                <div style="text-align: right;">
                    <div style="font-size: 11px; color: var(--text-muted);">Stały wóz:</div>
                    <div id="bus-display" style="font-weight: bold; color: var(--accent-blue); font-size: 18px;">#---</div>
                </div>
            </div>

            <div id="days-container">
                </div>
        </div>

    </div>

    <script>
        // TWOJA KONFIGURACJA Z FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBVzHQx3OkcLZ-RDwq4Asrd7NfszmhLtME",
            authDomain: "gait-panel.firebaseapp.com",
            databaseURL: "https://gait-panel-default-rtdb.firebaseio.com",
            projectId: "gait-panel",
            storageBucket: "gait-panel.appspot.com",
            messagingSenderId: "164822494222",
            appId: "1:164822494222:web:cc4b8e9d2465cc47efa05f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // AUTOMATYCZNE POBIERANIE KOMUNIKATÓW NA ŻYWO Z CHMURY
        database.ref('dispatcherMessages').on('value', (snapshot) => {
            const messages = snapshot.val() || [];
            const container = document.getElementById('live-messages-container');
            
            if (messages.length === 0) {
                container.innerHTML = `<div style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 10px;">Brak aktualnych komunikatów na sieci. Spokojnej służby!</div>`;
                return;
            }

            container.innerHTML = messages.map(msg => `
                <div class="msg-item ${msg.type}">
                    <span class="msg-tag">${msg.tag}</span>
                    <div class="msg-title">${msg.title}</div>
                    <div class="msg-text">${msg.content}</div>
                </div>
            `).join('');
        });

        // SPRAWDZANIE GRAFIKU W BAZIE ONLINE
        function checkScheduleLive() {
            const id = document.getElementById('driver-id-input').value.trim();
            if (!id) return alert("Wpisz swoje ID!");

            database.ref('systemDatabase/' + id).once('value').then((snapshot) => {
                const driverData = snapshot.val();
                const block = document.getElementById('schedule-block');

                if (!driverData) {
                    alert("Nie znaleziono grafiku dla podanego ID. Skontaktuj się z dyspozytorem!");
                    block.style.display = "none";
                    return;
                }

                document.getElementById('driver-name-display').innerText = driverData.name;
                document.getElementById('dispatcher-signature').innerText = `Wystawił: ${driverData.dispatcher || 'Dyspozytor Dyżurny'}`;
                document.getElementById('bus-display').innerText = driverData.busNum || '#---';

                const daysHtml = driverData.schedule.map(day => `
                    <div class="day-row ${day.current ? 'active' : ''}">
                        <div class="day-top">
                            <span class="day-name">${day.date}</span>
                            <span class="line-badge">Linia: ${day.line}</span>
                        </div>
                        <div class="day-details">
                            <div>🕒 Godziny: <strong>${day.hours}</strong></div>
                            <div>🗺️ Kierunek: <strong>${day.route}</strong></div>
                        </div>
                    </div>
                `).join('');

                document.getElementById('days-container').innerHTML = daysHtml;
                block.style.display = "block";
                
                // Płynne przewinięcie do grafiku na telefonach
                block.scrollIntoView({ behavior: 'smooth' });
            });
        }
    </script>
</body>
</html>
